name: Sync docs branch

on:
  push:
    branches-ignore:
      - docs
    paths:
      - "docs/**"
      - "toxy-ux-kit/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - "AGENTS.md"
      - "CHANGELOG.md"
      - "SECURITY.md"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
      - ".cursor/skills/**"
      - "scripts/dev/docs_branch_manifest.txt"
      - "scripts/dev/publish_docs_branch.sh"
      - ".github/workflows/sync-docs-branch.yml"
  workflow_dispatch:
    inputs:
      source_ref:
        description: Branch or tag to publish from
        required: false
        default: integrate

permissions:
  contents: write

concurrency:
  group: sync-docs-branch
  cancel-in-progress: false

jobs:
  publish:
    name: Publish docs-only branch
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.ref }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish docs branch
        env:
          DOCS_BRANCH: docs
          SOURCE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.ref_name }}
          FULL_REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          chmod +x ./scripts/dev/publish_docs_branch.sh
          SOURCE_SHA="$(git rev-parse HEAD)" \
          bash ./scripts/dev/publish_docs_branch.sh
