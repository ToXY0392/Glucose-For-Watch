name: Weekly doc drift issue

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  open-doc-drift-issue:
    name: Open doc drift checklist issue
    runs-on: ubuntu-latest
    steps:
      - name: Create weekly doc drift issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          DATE="$(date -u +%Y-%m-%d)"
          EXISTING="$(gh issue list --repo "$GITHUB_REPOSITORY" --search "Doc drift check $DATE in:title" --json number --jq '.[0].number // empty')"
          if [[ -n "$EXISTING" ]]; then
            echo "Issue already exists: #$EXISTING"
            exit 0
          fi
          BODY_FILE="$(mktemp)"
          {
            echo "## Weekly doc drift ritual (AUTO-5)"
            echo ""
            echo "Run \`@glucose-for-watch-doc-drift-checker\` or review manually:"
            echo ""
            echo "- [ ] \`README.md\` vs app behaviour"
            echo "- [ ] \`docs/dev/setup.md\` commands still valid"
            echo "- [ ] \`docs/dev/architecture.md\` matches modules"
            echo "- [ ] \`docs/plan/PROGRESS.md\` scoreboard date"
            echo "- [ ] \`docs/plan/DOC-BACKLOG.md\` sync (\`@glucose-for-watch-doc-backlog-sync\`)"
            echo "- [ ] Cross-links: \`python3 scripts/dev/check_docs_links.py\`"
            echo ""
            echo "Pair with \`@glucose-for-watch-github-project-sync\` (Monday)."
            echo ""
            echo "Refs: #17 · skill \`glucose-for-watch-doc-drift-checker\`"
          } > "$BODY_FILE"
          gh issue create --repo "$GITHUB_REPOSITORY" \
            --title "[bloc-s] Doc drift check $DATE" \
            --label "bloc-s,area:infra,docs-only" \
            --body-file "$BODY_FILE"
