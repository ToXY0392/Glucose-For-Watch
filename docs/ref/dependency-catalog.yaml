# Registre structuré — documentation officielle des outils Widget G7
# Maintenir en parallèle avec : build.gradle.kts (racine), mobile/build.gradle.kts, wear/build.gradle.kts
# Schéma implicite v1 ; les champs sont extensibles (notes, deprecated, …)

meta:
  registry_version: 1
  project: WidgetG7
  updated: "2026-05-07"
  human_index: README.md
  flat_table: dependency-registry.md

build_toolchain:
  jdk:
    version: "17"
    docs:
      - url: https://developer.android.com/build/jdks
        label: JDK Android Gradle
  android_gradle_plugin:
    version: "9.2.1"
    docs:
      - url: https://developer.android.com/build/releases/gradle-plugin
        label: Notes de version AGP
  kotlin_android_plugin:
    version: "2.3.20"
    docs:
      - url: https://kotlinlang.org/docs/gradle-configure-project.html
        label: Kotlin avec Gradle
  gradle_wrapper_distribution:
    version: "9.4.1"
    file: gradle/wrapper/gradle-wrapper.properties
    docs:
      - url: https://docs.gradle.org/current/userguide/userguide.html
        label: Manuel utilisateur Gradle
  android_sdk_compile:
    compile_sdk: 36
    docs:
      - url: https://developer.android.com/guide/topics/manifest/uses-sdk-element
        label: uses-sdk et niveaux API
      - url: https://developer.android.com/reference/android/os/Build.VERSION_CODES
        label: Codes version Android

repositories:
  - id: google-maven
    url: https://maven.google.com
    docs:
      - url: https://developer.android.com/studio/build#repositories-plugin
        label: Dépôts Gradle Android
  - id: maven-central
    url: https://repo1.maven.org/maven2/
    docs:
      - url: https://central.sonatype.org/
        label: Maven Central (hébergement)
  - id: jitpack
    url: https://jitpack.io
    docs:
      - url: https://docs.jitpack.io/
        label: Documentation JitPack
    note: Déclaré dans settings.gradle.kts ; usage effectif selon dépendances.

gradle_modules_included:
  - ":mobile"
  - ":wear"

# Outils sans coordonnées Maven (protocoles, plugins seuls)
vendor_systems:
  - id: dexcom-share-http
    kind: vendor_http_api
    official_public_spec: false
    markdown: dexcom-share.md
    code:
      - feature/dexcom-share/src/main/java/com/widgetg7/feature/dexcomshare/DexcomShareClient.kt
      - mobile/src/main/java/com/widgetg7/mobile/data/PhoneGlucoseSourceFactory.kt
    hosts:
      - share2.dexcom.com
      - shareous1.dexcom.com
    path_prefix: /ShareWebServices/Services/
    related_official_docs:
      - url: https://developer.dexcom.com/
        label: Dexcom Developer (API OAuth v3 distincte du Share HTTP)
      - url: https://developer.dexcom.com/docs/dexcomv3/endpoint-overview
        label: Endpoints API v3
      - url: https://developer.dexcom.com/docs/dexcom/authentication
        label: Authentification API Dexcom

# Plugins Gradle (racine)
gradle_plugins:
  - id: com.android.application
    version: "9.2.1"
    markdown: kotlin-gradle-build.md
    docs:
      - url: https://developer.android.com/build
        label: Android build system
  - id: org.jetbrains.kotlin.android
    version: "2.3.20"
    markdown: kotlin-gradle-build.md
    docs:
      - url: https://kotlinlang.org/docs/home.html
        label: Documentation Kotlin

# Dépendances runtime (implementation)
