# Outils build implicites (fichiers projet)
implicit_build_tools:
  - id: proguard-r8
    config_files:
      - mobile/proguard-rules.pro
      - wear/proguard-rules.pro
    docs:
      - url: https://developer.android.com/build/shrink-code
        label: Réduire, obfusquer et optimiser (R8)
  - id: android-adb
    used_by:
      - script installWidgetG7Debug dans build.gradle.kts racine
      - déploiement local
    docs:
      - url: https://developer.android.com/tools/adb
        label: Android Debug Bridge (adb)
    related_code:
      - com.flyfishxu:kadb sur mobile pour ADB depuis l’app
